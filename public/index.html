<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="AG2R — Mobile remote interface for Antigravity AI coding sessions">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="/ag2r-icon.png">
  <link rel="apple-touch-icon" href="/ag2r-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-title" content="AG2R">
  <meta name="theme-color" content="#090e17">
  <title>AG2R</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app" class="app">

    <!-- Header — minimal, AG's captured components handle sidebar toggles -->
    <header id="header" class="header">
      <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
        <span class="material-symbols-rounded">menu</span>
      </button>
      <img src="/ag2r-icon.png" alt="AG2R" class="header-icon" width="32" height="32">
      <h1 class="header-title">AG2R</h1>
      <div id="connection-status" class="connection-dot" data-status="disconnected" title="Disconnected"></div>
      <button id="refresh-btn" class="icon-btn" aria-label="Refresh" title="Refresh">
        <span class="material-symbols-rounded">refresh</span>
      </button>
      <button id="review-toggle" class="icon-btn" aria-label="Toggle review panel" title="Review">
        <span class="material-symbols-rounded">right_panel_open</span>
      </button>
    </header>

    <!-- Left Sidebar — receives AG's captured sidebar content -->
    <aside id="left-sidebar" class="left-sidebar" inert>
      <style id="left-sidebar-cdp-styles"></style>
      <div id="left-sidebar-content" class="sidebar-fill"></div>
    </aside>
    <div id="left-sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Right Sidebar — receives AG's captured review panel content -->
    <aside id="right-sidebar" class="right-sidebar" inert>
      <style id="right-sidebar-cdp-styles"></style>
      <div id="right-sidebar-content" class="sidebar-fill"></div>
    </aside>
    <div id="right-sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Subagent back bar (shown when viewing a subagent conversation) -->
    <div id="subagent-bar" class="subagent-bar hidden">
      <button id="subagent-back-btn" class="subagent-back-btn" aria-label="Back to parent conversation">
        <span class="material-symbols-rounded">arrow_back</span>
        <span id="subagent-parent-name" class="subagent-parent-name"></span>
      </button>
      <span class="subagent-label">Subagent</span>
    </div>

    <!-- Chat Area -->
    <main id="chat-area" class="chat-area">
      <style id="cdp-styles"></style>
      <div id="chat-content" class="chat-content"></div>
      <div id="empty-state" class="empty-state">
        <span class="material-symbols-rounded empty-icon">chat_bubble_outline</span>
        <p class="empty-title">No active chat</p>
        <p class="empty-subtitle">Waiting for Antigravity connection...</p>
      </div>
    </main>

    <!-- Scroll-to-bottom FAB -->
    <button id="scroll-fab" class="scroll-fab" aria-label="Scroll to bottom">
      <span class="material-symbols-rounded">keyboard_arrow_down</span>
    </button>

    <!-- Quick-action shortcuts -->
    <div id="quick-actions" class="quick-actions">
      <button class="quick-action-chip" data-message="Continue">Continue</button>
      <button class="quick-action-chip" data-message="Proceed">Proceed</button>
    </div>

    <!-- Input Bar -->
    <footer id="input-bar" class="input-bar">
      <!-- Running tasks strip (inside input bar so ResizeObserver tracks its height) -->
      <div id="running-tasks" class="running-tasks hidden">
        <button id="running-tasks-header" class="running-tasks-header">
          <span id="running-tasks-count" class="running-tasks-count"></span>
          <span class="material-symbols-rounded running-tasks-arrow">expand_less</span>
        </button>
        <div id="running-tasks-list" class="running-tasks-list"></div>
      </div>
      <div class="input-wrapper">
        <div id="image-preview-strip" class="image-preview-strip hidden"></div>
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Ask anything, @ to mention, / for actions"
          rows="3"
          autocomplete="off"
          autocorrect="on"
          autocapitalize="sentences"
          enterkeyhint="enter"
        ></textarea>
        <div class="input-controls">
          <div class="input-left-actions">
            <input type="file" id="photo-input" accept="image/*" multiple hidden>
            <button id="attach-btn" class="attach-btn" type="button" aria-label="Add context">
              <span class="material-symbols-rounded">add</span>
            </button>
            <button id="model-chip" class="model-chip" type="button" data-ag-click-id="model:0" data-ag-click-label="">
              <span class="model-chip-text"></span>
              <span class="material-symbols-rounded model-chip-chevron">expand_more</span>
            </button>
          </div>
          <div class="input-right-actions">
            <button id="mic-btn" class="mic-btn" aria-label="Voice input" type="button">
              <span class="material-symbols-rounded mic-icon">mic</span>
            </button>
            <button id="action-btn" class="action-btn" data-action="send" aria-label="Send message">
              <span class="material-symbols-rounded action-icon" id="action-icon">arrow_upward</span>
            </button>
          </div>
        </div>
      </div>
    </footer>

    <!-- Dropdown overlay for AG portal menus (conversation options etc.) -->
    <div id="dropdown-overlay" class="dropdown-overlay hidden">
      <div id="dropdown-backdrop" class="dropdown-backdrop"></div>
      <div id="dropdown-content" class="dropdown-content"></div>
    </div>
    <!-- Permission banner overlay -->
    <div id="permission-overlay" class="permission-overlay hidden">
      <div id="permission-backdrop" class="permission-backdrop"></div>
      <div id="permission-content" class="permission-content"></div>
    </div>
    <!-- Settings full-screen overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
      <div class="settings-header">
        <button id="settings-back" class="settings-back-btn" aria-label="Back">
          <span class="material-symbols-rounded">arrow_back</span>
        </button>
        <span class="settings-title">Settings</span>
      </div>
      <div id="settings-content" class="settings-content"></div>
    </div>
    <!-- Scheduled Tasks full-screen overlay -->
    <div id="scheduled-tasks-overlay" class="scheduled-tasks-overlay hidden">
      <div class="scheduled-tasks-header">
        <button id="scheduled-tasks-back" class="settings-back-btn" aria-label="Back">
          <span class="material-symbols-rounded">arrow_back</span>
        </button>
        <span class="settings-title">Scheduled Tasks</span>
      </div>
      <div id="scheduled-tasks-content" class="scheduled-tasks-content"></div>
      <div id="scheduled-tasks-dialog" class="scheduled-tasks-dialog hidden"></div>
    </div>
    <!-- Text input modal (for scheduled tasks form fields) -->
    <div id="text-input-modal" class="text-input-modal hidden">
      <div id="text-input-backdrop" class="text-input-backdrop"></div>
      <div class="text-input-card">
        <label id="text-input-label" class="text-input-label"></label>
        <input id="text-input-field" class="text-input-field" type="text" autocomplete="off" />
        <textarea id="text-input-area" class="text-input-area hidden" rows="4"></textarea>
        <div class="text-input-actions">
          <button id="text-input-cancel" class="text-input-btn cancel">Cancel</button>
          <button id="text-input-submit" class="text-input-btn submit">Done</button>
        </div>
      </div>
    </div>
    <!-- Floating comment button (appears on text selection in right sidebar) -->
    <button id="comment-fab" class="comment-fab hidden" aria-label="Add comment">
      <span class="material-symbols-rounded">add_comment</span>
    </button>

    <!-- Comment input modal -->
    <div id="comment-modal" class="comment-modal hidden">
      <div id="comment-modal-backdrop" class="dropdown-backdrop"></div>
      <div class="comment-modal-content">
        <div class="comment-modal-header">
          <span class="material-symbols-rounded" style="font-size:20px;color:var(--accent)">comment</span>
          <span>Add Comment</span>
        </div>
        <div id="comment-selection-preview" class="comment-selection-preview"></div>
        <textarea id="comment-input" class="comment-input" placeholder="Type your comment..." rows="3"></textarea>
        <div class="comment-modal-actions">
          <button id="comment-cancel" class="comment-action-btn cancel">Cancel</button>
          <button id="comment-submit" class="comment-action-btn submit">Add Comment</button>
        </div>
      </div>
    </div>

    <!-- Restart Antigravity confirmation modal -->
    <div id="restart-confirm" class="restart-confirm hidden">
      <div class="restart-confirm-backdrop"></div>
      <div class="restart-confirm-card">
        <span class="material-symbols-rounded" style="font-size:32px;color:var(--red)">restart_alt</span>
        <div class="restart-confirm-title">Restart Antigravity?</div>
        <div class="restart-confirm-message">This will restart the Antigravity desktop app. All running agent sessions will be interrupted.</div>
        <div class="restart-confirm-actions">
          <button id="restart-cancel" class="restart-confirm-btn cancel">Cancel</button>
          <button id="restart-go" class="restart-confirm-btn destructive">Restart</button>
        </div>
      </div>
    </div>

    <!-- Comment review modal (view/edit/delete queued comments) -->
    <div id="comment-review-modal" class="comment-modal hidden">
      <div id="comment-review-backdrop" class="dropdown-backdrop"></div>
      <div class="comment-review-content">
        <div class="comment-modal-header">
          <span class="material-symbols-rounded" style="font-size:20px;color:#6366f1">reviews</span>
          <span>Queued Comments</span>
        </div>
        <div id="comment-review-list" class="comment-review-list"></div>
        <div class="comment-modal-actions">
          <button id="comment-review-close" class="comment-action-btn cancel">Close</button>
          <button id="comment-review-clear" class="comment-action-btn cancel" style="color:#f87171">Clear All</button>
          <button id="comment-review-send" class="comment-action-btn submit">Send All</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
