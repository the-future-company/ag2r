<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="AG2R — Mobile remote interface for Antigravity AI coding sessions">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="theme-color" content="#090e17">
  <title>AG2R</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app" class="app">

    <!-- Header — minimal, AG's captured components handle sidebar toggles -->
    <header id="header" class="header">
      <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
        <span class="material-symbols-rounded">menu</span>
      </button>
      <img src="/ag2r-icon.png" alt="AG2R" class="header-icon" width="32" height="32">
      <h1 class="header-title">AG2R</h1>
      <div id="connection-status" class="connection-dot" data-status="disconnected" title="Disconnected"></div>
      <button id="review-toggle" class="icon-btn" aria-label="Toggle review panel" title="Review">
        <span class="material-symbols-rounded">right_panel_open</span>
      </button>
    </header>

    <!-- Left Sidebar — receives AG's captured sidebar content -->
    <aside id="left-sidebar" class="left-sidebar" inert>
      <style id="left-sidebar-cdp-styles"></style>
      <div id="left-sidebar-content" class="sidebar-fill"></div>
    </aside>
    <div id="left-sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Right Sidebar — receives AG's captured review panel content -->
    <aside id="right-sidebar" class="right-sidebar" inert>
      <style id="right-sidebar-cdp-styles"></style>
      <div id="right-sidebar-content" class="sidebar-fill"></div>
    </aside>
    <div id="right-sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Chat Area -->
    <main id="chat-area" class="chat-area">
      <style id="cdp-styles"></style>
      <div id="chat-content" class="chat-content"></div>
      <div id="empty-state" class="empty-state">
        <span class="material-symbols-rounded empty-icon">chat_bubble_outline</span>
        <p class="empty-title">No active chat</p>
        <p class="empty-subtitle">Waiting for Antigravity connection...</p>
      </div>
    </main>

    <!-- Scroll-to-bottom FAB -->
    <button id="scroll-fab" class="scroll-fab" aria-label="Scroll to bottom">
      <span class="material-symbols-rounded">keyboard_arrow_down</span>
    </button>

    <!-- Quick-action shortcuts -->
    <div id="quick-actions" class="quick-actions">
      <button class="quick-action-chip" data-message="Continue">Continue</button>
    </div>

    <!-- Input Bar -->
    <footer id="input-bar" class="input-bar">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="Send a message..."
          rows="1"
          autocomplete="off"
          autocorrect="on"
          autocapitalize="sentences"
          enterkeyhint="enter"
        ></textarea>
        <button id="mic-btn" class="mic-btn" aria-label="Voice input" type="button">
          <span class="material-symbols-rounded mic-icon">mic</span>
        </button>
        <button id="action-btn" class="action-btn" data-action="send" aria-label="Send message">
          <span class="material-symbols-rounded action-icon" id="action-icon">arrow_upward</span>
        </button>
      </div>
    </footer>

    <!-- Dropdown overlay for AG portal menus (conversation options etc.) -->
    <div id="dropdown-overlay" class="dropdown-overlay hidden">
      <div id="dropdown-backdrop" class="dropdown-backdrop"></div>
      <div id="dropdown-content" class="dropdown-content"></div>
    </div>
    <!-- Permission banner overlay -->
    <div id="permission-overlay" class="permission-overlay hidden">
      <div id="permission-backdrop" class="permission-backdrop"></div>
      <div id="permission-content" class="permission-content"></div>
    </div>
    <!-- Floating comment button (appears on text selection in right sidebar) -->
    <button id="comment-fab" class="comment-fab hidden" aria-label="Add comment">
      <span class="material-symbols-rounded">add_comment</span>
    </button>

    <!-- Comment input modal -->
    <div id="comment-modal" class="comment-modal hidden">
      <div id="comment-modal-backdrop" class="dropdown-backdrop"></div>
      <div class="comment-modal-content">
        <div class="comment-modal-header">
          <span class="material-symbols-rounded" style="font-size:20px;color:var(--accent)">comment</span>
          <span>Add Comment</span>
        </div>
        <div id="comment-selection-preview" class="comment-selection-preview"></div>
        <textarea id="comment-input" class="comment-input" placeholder="Type your comment..." rows="3"></textarea>
        <div class="comment-modal-actions">
          <button id="comment-cancel" class="comment-action-btn cancel">Cancel</button>
          <button id="comment-submit" class="comment-action-btn submit">Add Comment</button>
        </div>
      </div>
    </div>

    <!-- Comment review modal (view/edit/delete queued comments) -->
    <div id="comment-review-modal" class="comment-modal hidden">
      <div id="comment-review-backdrop" class="dropdown-backdrop"></div>
      <div class="comment-review-content">
        <div class="comment-modal-header">
          <span class="material-symbols-rounded" style="font-size:20px;color:#6366f1">reviews</span>
          <span>Queued Comments</span>
        </div>
        <div id="comment-review-list" class="comment-review-list"></div>
        <div class="comment-modal-actions">
          <button id="comment-review-close" class="comment-action-btn cancel">Close</button>
          <button id="comment-review-clear" class="comment-action-btn cancel" style="color:#f87171">Clear All</button>
          <button id="comment-review-send" class="comment-action-btn submit">Send All</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
