<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AG2R Telemetry</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Inter', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      position: sticky; top: 0; z-index: 10;
      background: #0a0e1aee; backdrop-filter: blur(12px);
      padding: 16px 20px 12px; border-bottom: 1px solid #1e293b;
    }
    .header h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: inline;
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .refresh-btn {
      background: #312e81; color: #a5b4fc; border: 1px solid #4338ca;
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px;
    }
    .last-update { color: #475569; font-size: 11px; margin-top: 4px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; overflow-x: auto; padding: 0 20px;
      border-bottom: 1px solid #1e293b; background: #0f1320;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      padding: 10px 16px; font-size: 13px; color: #64748b;
      border: none; background: none; cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: #a5b4fc; border-bottom-color: #6366f1; }
    .tab .badge {
      background: #312e81; color: #a5b4fc; font-size: 10px;
      padding: 1px 6px; border-radius: 10px; margin-left: 4px;
    }

    /* Content */
    .content { padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Stat cards */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      background: #111827; border: 1px solid #1e293b;
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #818cf8; }
    .stat-card .label {
      font-size: 10px; color: #64748b; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 2px;
    }

    /* Chart cards */
    .chart-card {
      background: #111827; border: 1px solid #1e293b;
      border-radius: 12px; padding: 14px; margin-bottom: 14px;
    }
    .chart-card h3 {
      font-size: 14px; font-weight: 600; color: #cbd5e1; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chart-card h3 .count {
      font-size: 20px; font-weight: 700; color: #818cf8;
    }
    .chart-wrap { position: relative; height: 120px; }

    /* Timeline */
    .event-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #1e293b44; font-size: 12px;
    }
    .event-time { color: #475569; font-family: monospace; font-size: 11px; white-space: nowrap; }
    .event-tag {
      background: #312e81; color: #a5b4fc; padding: 2px 8px;
      border-radius: 6px; font-size: 11px; font-weight: 500; white-space: nowrap;
    }
    .event-detail { color: #475569; font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
    .empty { text-align: center; padding: 40px; color: #334155; font-size: 14px; }

    @media (max-width: 400px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <h1>📊 AG2R Telemetry</h1>
      <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
    </div>
    <div class="last-update" id="lastUpdate">Loading...</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="content" id="content"></div>

  <script>
    const COLORS = {
      session_start: '#34d399', session_end: '#f87171', session_heartbeat: '#fbbf24',
      message_sent: '#818cf8', image_uploaded: '#e879f9', code_copied: '#22d3ee',
      generation_stopped: '#fb923c', cdp_disconnected: '#f87171', cdp_reconnected: '#34d399',
      login: '#a78bfa', conversation_switched: '#6366f1', scheduled_task_viewed: '#c084fc',
      plan_approved: '#4ade80', command_accepted: '#2dd4bf', api_error: '#ef4444',
      comment_added: '#818cf8', comment_edited: '#a78bfa', comment_deleted: '#f472b6',
      comments_sent: '#6366f1', voice_input_used: '#f59e0b', artifact_viewed: '#38bdf8',
      model_changed: '#e879f9', branch_changed: '#c084fc', worktree_changed: '#a78bfa',
      quick_action_used: '#facc15', client_error: '#ef4444',
    };
    const DEFAULT_COLOR = '#64748b';

    const GROUPS = [
      { id: 'overview', label: 'Overview', events: null },
      { id: 'messaging', label: 'Messaging', events: ['message_sent', 'image_uploaded', 'quick_action_used', 'voice_input_used'] },
      { id: 'session', label: 'Sessions', events: ['session_start', 'session_end', 'session_heartbeat', 'login'] },
      { id: 'nav', label: 'Navigation', events: ['conversation_switched', 'scheduled_task_viewed', 'artifact_viewed'] },
      { id: 'actions', label: 'Actions', events: ['plan_approved', 'command_accepted', 'code_copied', 'generation_stopped'] },
      { id: 'comments', label: 'Comments', events: ['comment_added', 'comment_edited', 'comment_deleted', 'comments_sent'] },
      { id: 'config', label: 'Config', events: ['model_changed', 'branch_changed', 'worktree_changed'] },
      { id: 'errors', label: 'Errors', events: ['api_error', 'client_error', 'cdp_disconnected', 'cdp_reconnected'] },
    ];

    let allEvents = [];
    let charts = {};
    let activeTab = 'overview';

    function switchTab(id) {
      activeTab = id;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + id));
    }

    function buildTabs() {
      const counts = {};
      allEvents.forEach(e => { counts[e.event] = (counts[e.event] || 0) + 1; });

      document.getElementById('tabs').innerHTML = GROUPS.map(g => {
        const cnt = g.events ? g.events.reduce((s, e) => s + (counts[e] || 0), 0) : allEvents.length;
        return `<button class="tab${g.id === activeTab ? ' active' : ''}" data-id="${g.id}" onclick="switchTab('${g.id}')">${g.label}<span class="badge">${cnt}</span></button>`;
      }).join('');
    }

    function makeTimelineChart(canvas, events, color) {
      // Bucket events by hour
      const buckets = {};
      events.forEach(e => {
        const h = (e.timestamp || '').substring(0, 13); // YYYY-MM-DDTHH
        if (h) buckets[h] = (buckets[h] || 0) + 1;
      });
      const keys = Object.keys(buckets).sort();
      // Show last 48 hours max
      const recent = keys.slice(-48);

      return new Chart(canvas, {
        type: 'bar',
        data: {
          labels: recent.map(k => k.substring(5, 16).replace('T', ' ')),
          datasets: [{
            data: recent.map(k => buckets[k]),
            backgroundColor: color + '66',
            borderColor: color,
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { title: (items) => items[0]?.label || '' } } },
          scales: {
            x: { display: false },
            y: { display: false, beginAtZero: true }
          },
          animation: { duration: 300 }
        }
      });
    }

    function renderOverview() {
      const panel = document.getElementById('panel-overview');
      const counts = {};
      allEvents.forEach(e => { counts[e.event] = (counts[e.event] || 0) + 1; });
      const uniqueDays = new Set(allEvents.map(e => (e.timestamp || '').substring(0, 10)));
      const sessions = counts['session_start'] || 0;
      const messages = counts['message_sent'] || 0;

      const uniqueUsers = new Set(allEvents.map(e => e.installId).filter(Boolean));

      let html = `<div class="stats-row">
        <div class="stat-card"><div class="value">${uniqueUsers.size}</div><div class="label">Users</div></div>
        <div class="stat-card"><div class="value">${allEvents.length}</div><div class="label">Events</div></div>
        <div class="stat-card"><div class="value">${uniqueDays.size}</div><div class="label">Days</div></div>
        <div class="stat-card"><div class="value">${sessions}</div><div class="label">Sessions</div></div>
        <div class="stat-card"><div class="value">${messages}</div><div class="label">Messages</div></div>
        <div class="stat-card"><div class="value">${(counts['api_error'] || 0) + (counts['client_error'] || 0)}</div><div class="label">Errors</div></div>
      </div>`;

      // Overall timeline
      html += `<div class="chart-card"><h3>All Events Over Time</h3><div class="chart-wrap" style="height:160px"><canvas id="chart-all"></canvas></div></div>`;

      // Top events bar chart
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      html += `<div class="chart-card"><h3>Event Breakdown</h3><div class="chart-wrap" style="height:${Math.max(sorted.length * 28, 100)}px"><canvas id="chart-breakdown"></canvas></div></div>`;

      // Recent events
      const recent = allEvents.slice(-15).reverse();
      html += `<div class="chart-card"><h3>Recent Events</h3>`;
      html += recent.map(e => {
        const t = (e.timestamp || '').substring(5, 19).replace('T', ' ');
        const extras = [];
        if (e.type) extras.push(e.type);
        if (e.label) extras.push(e.label);
        if (e.endpoint) extras.push(e.endpoint);
        const detail = extras.join(', ');
        return `<div class="event-row"><span class="event-time">${t}</span><span class="event-tag" style="background:${(COLORS[e.event] || DEFAULT_COLOR)}33;color:${COLORS[e.event] || DEFAULT_COLOR}">${e.event}</span>${detail ? `<span class="event-detail">${detail}</span>` : ''}</div>`;
      }).join('');
      html += `</div>`;

      panel.innerHTML = html;

      // Render overview charts
      if (charts['all']) charts['all'].destroy();
      charts['all'] = makeTimelineChart(document.getElementById('chart-all'), allEvents, '#818cf8');

      if (charts['breakdown']) charts['breakdown'].destroy();
      charts['breakdown'] = new Chart(document.getElementById('chart-breakdown'), {
        type: 'bar',
        data: {
          labels: sorted.map(([k]) => k),
          datasets: [{
            data: sorted.map(([, v]) => v),
            backgroundColor: sorted.map(([k]) => (COLORS[k] || DEFAULT_COLOR) + '88'),
            borderColor: sorted.map(([k]) => COLORS[k] || DEFAULT_COLOR),
            borderWidth: 1, borderRadius: 4,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#1e293b' }, ticks: { color: '#475569', font: { size: 10 } } },
            y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } }
          }
        }
      });
    }

    function renderGroup(group) {
      const panel = document.getElementById('panel-' + group.id);
      if (!group.events) return;

      const counts = {};
      allEvents.forEach(e => { if (group.events.includes(e.event)) counts[e.event] = (counts[e.event] || 0) + 1; });

      let html = '';
      for (const eventName of group.events) {
        const c = counts[eventName] || 0;
        const color = COLORS[eventName] || DEFAULT_COLOR;
        const filtered = allEvents.filter(e => e.event === eventName);

        html += `<div class="chart-card">
          <h3><span>${eventName.replace(/_/g, ' ')}</span><span class="count">${c}</span></h3>
          ${c > 0
            ? `<div class="chart-wrap"><canvas id="chart-${group.id}-${eventName}"></canvas></div>`
            : '<div class="empty">No events yet</div>'
          }
        </div>`;
      }
      panel.innerHTML = html;

      // Render per-event charts
      for (const eventName of group.events) {
        const filtered = allEvents.filter(e => e.event === eventName);
        if (filtered.length === 0) continue;
        const canvasId = `chart-${group.id}-${eventName}`;
        const canvas = document.getElementById(canvasId);
        if (!canvas) continue;
        const key = canvasId;
        if (charts[key]) charts[key].destroy();
        charts[key] = makeTimelineChart(canvas, filtered, COLORS[eventName] || DEFAULT_COLOR);
      }
    }

    async function loadData() {
      try {
        const r = await fetch('/telemetry/events');
        allEvents = await r.json();
        document.getElementById('lastUpdate').textContent = `${allEvents.length} events · Updated ${new Date().toLocaleTimeString()}`;

        // Build tabs
        buildTabs();

        // Build panels
        let panelsHtml = GROUPS.map(g =>
          `<div class="tab-panel${g.id === activeTab ? ' active' : ''}" id="panel-${g.id}"></div>`
        ).join('');
        document.getElementById('content').innerHTML = panelsHtml;

        // Render active + overview
        renderOverview();
        GROUPS.filter(g => g.events).forEach(renderGroup);

      } catch (e) {
        document.getElementById('lastUpdate').textContent = 'Error: ' + e.message;
      }
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
